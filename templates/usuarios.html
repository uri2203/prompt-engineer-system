{% extends "layout.html" %}

{% block content %}
<div class="flex-1 flex flex-col p-8 overflow-y-auto bg-[#0B1120]">
    <header class="mb-8 border-b border-slate-800 pb-4">
        <h2 class="text-3xl font-black text-slate-200 tracking-tighter">CONTROL DE ACCESO (PERSONAL)</h2>
        <p class="text-slate-400 text-xs font-mono uppercase tracking-widest">Gestión de credenciales y jerarquías del sistema</p>
    </header>

    <div class="bg-[#0F1523] border border-slate-800 rounded-xl overflow-hidden shadow-lg">
        <table class="w-full text-left text-sm text-slate-300">
            <thead class="bg-[#1e293b] text-[10px] uppercase tracking-widest font-bold">
                <tr>
                    <th class="px-6 py-4">Usuario</th>
                    <th class="px-6 py-4">Rol de Sistema</th>
                    <th class="px-6 py-4">Estado</th>
                    <th class="px-6 py-4 text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla_usuarios" class="divide-y divide-slate-800">
                </tbody>
        </table>
    </div>
</div>
{% endblock %}
