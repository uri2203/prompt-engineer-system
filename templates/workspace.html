{% extends "layout.html" %}
{% block content %}
<div class="flex flex-col lg:flex-row h-full overflow-hidden">
    
    <div class="w-full lg:w-1/3 bg-[#0B1120] border-r border-slate-800 p-6 flex flex-col overflow-y-auto">
        <header class="mb-6 border-b border-slate-800 pb-4">
            <h2 class="text-2xl font-black text-white tracking-tighter uppercase">Terminal de Producción</h2>
            <p class="label-blue mt-1">Generación de Guiones Nivel 1</p>
        </header>

        <form id="form_generacion" class="space-y-5 flex-1">
            <div>
                <label class="label-blue block mb-2">Silo de Marca (ADN)</label>
                <select id="input_marca" class="w-full p-3 text-sm bg-[#0F1523] border border-slate-700 rounded text-white focus:border-blue-500 outline-none">
                    <option value="La Viuda">La Viuda (Terror Psicológico)</option>
                    </select>
            </div>

            <div>
                <label class="label-blue block mb-2">Formato Objetivo</label>
                <select id="input_longitud" class="w-full p-3 text-sm bg-[#0F1523] border border-slate-700 rounded text-white focus:border-blue-500 outline-none">
                    <option value="130 palabras">YouTube Short Viral (60 seg / 130 palabras)</option>
                    <option value="260 palabras">Video Corto Retención (2 min / 260 palabras)</option>
                    <option value="4900 palabras">Documental Largo (30 min / 4900 palabras)</option>
                </select>
            </div>

            <div>
                <label class="label-blue block mb-2">Contexto de la Historia</label>
                <input type="text" id="input_contexto" placeholder="Ej. Un hospital abandonado en 1999..." class="w-full p-3 text-sm bg-[#0F1523] border border-slate-700 rounded text-white focus:border-blue-500 outline-none">
            </div>

            <div class="flex-1 flex flex-col">
                <label class="label-blue block mb-2">Directriz para el Operador IA</label>
                <textarea id="input_peticion" placeholder="Escribe la anomalía o el vacío de información que detonará la historia..." class="w-full flex-1 p-3 text-sm bg-[#0F1523] border border-slate-700 rounded text-white focus:border-blue-500 outline-none min-h-[120px] resize-none"></textarea>
            </div>

            <button type="button" onclick="ejecutarMotor()" id="btn_ejecutar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded shadow-lg shadow-blue-900/40 uppercase text-xs tracking-widest transition-all mt-4">
                Compilar y Ejecutar
            </button>
        </form>
    </div>

    <div class="w-full lg:w-2/3 bg-[#0F1523] flex flex-col p-6">
        <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Consola de Salida</h3>
            <span class="text-[9px] font-mono text-blue-400 border border-blue-900 bg-blue-900/20 px-2 py-1 rounded">Esperando Instrucciones</span>
        </div>
        
        <div id="consola_salida" class="flex-1 bg-black rounded-lg border border-slate-800 p-6 overflow-y-auto font-mono text-sm text-green-500 whitespace-pre-wrap shadow-inner">
> Sistema inicializado.
> Silos herméticos en línea.
> Seleccione los parámetros en el panel izquierdo e inicie la secuencia.
        </div>
    </div>
</div>

<script>
async function ejecutarMotor() {
    const btn = document.getElementById('btn_ejecutar');
    const consola = document.getElementById('consola_salida');
    
    const payload = {
        marca: document.getElementById('input_marca').value,
        longitud: document.getElementById('input_longitud').value,
        contexto: document.getElementById('input_contexto').value,
        peticion: document.getElementById('input_peticion').value
    };

    if(!payload.contexto || !payload.peticion) {
        consola.innerHTML = `<span class="text-red-500">> [ERROR CRÍTICO] Campos de contexto o petición vacíos. Imposible compilar.</span>`;
        return;
    }

    // Estado de carga
    btn.disabled = true;
    btn.innerHTML = "PROCESANDO MATRIZ...";
    btn.classList.add('bg-slate-600', 'cursor-not-allowed');
    btn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
    
    consola.innerHTML = `> Inyectando ADN de [${payload.marca}]...\n> Calibrando formato para [${payload.longitud}]...\n> Contactando servidor Gemini...\n<span class="animate-pulse text-yellow-500">> Generando guion de alta retención...</span>`;

    try {
        const response = await fetch('/api/generate_script', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if(data.status === "success") {
            consola.innerHTML = `<span class="text-blue-400">> [COMPILACIÓN EXITOSA]</span>\n\n<span class="text-slate-300">${data.data}</span>`;
        } else {
            consola.innerHTML = `<span class="text-red-500">> [ERROR DEL SERVIDOR] ${data.message || "Falla desconocida"}</span>`;
        }
    } catch (error) {
        consola.innerHTML = `<span class="text-red-500">> [ERROR DE RED] No se pudo establecer conexión con el motor IA.</span>`;
    } finally {
        // Restaurar botón
        btn.disabled = false;
        btn.innerHTML = "COMPILAR Y EJECUTAR";
        btn.classList.remove('bg-slate-600', 'cursor-not-allowed');
        btn.classList.add('bg-blue-600', 'hover:bg-blue-500');
    }
}
</script>
{% endblock %}
