{% extends "layout.html" %}

{% block content %}
<div class="w-[220px] bg-[#0B1120] border-r border-slate-800 p-5 flex flex-col space-y-2 overflow-y-auto">
    <button onclick="switchTab('mod_1')" id="btn_mod_1" class="w-full text-left px-4 py-3 text-xs active-tab">Mod 1: Traductor</button>
    <button onclick="switchTab('mod_2')" id="btn_mod_2" class="w-full text-left px-4 py-3 text-xs inactive-tab">Mod 2: Guiones</button>
    <button onclick="switchTab('mod_3')" id="btn_mod_3" class="w-full text-left px-4 py-3 text-xs inactive-tab">Mod 3: Hooks</button>
    <button onclick="switchTab('mod_4')" id="btn_mod_4" class="w-full text-left px-4 py-3 text-xs inactive-tab">Mod 4: Empaquetado</button>
    <button onclick="switchTab('mod_5')" id="btn_mod_5" class="w-full text-left px-4 py-3 text-xs inactive-tab">Mod 5: Ventas</button>
    <button onclick="switchTab('mod_0')" id="btn_mod_0" class="w-full text-left px-4 py-3 text-xs inactive-tab text-emerald-500">Mod 0: ADN</button>
</div>

<div class="flex-1 flex flex-col p-8 gap-6 overflow-y-auto scrollbar-hide">
    
    <div id="ui_mod_1" class="module-content block space-y-4">
        <h2 class="text-xl font-bold">Traductor Universal</h2>
        <div><label class="label-blue">Rol / Experto</label><select id="m1_rol" class="w-full p-2.5"><option>Ingeniero de Software</option><option>Analista de Datos</option><option>Asesor Estratégico</option></select></div>
        <div><label class="label-blue">Contexto</label><textarea id="m1_contexto" class="w-full h-24 p-2.5"></textarea></div>
        <div><label class="label-blue">Petición Humana</label><textarea id="m1_texto" class="w-full h-32 p-2.5"></textarea></div>
        <div><label class="label-blue">Formato</label><select id="m1_formato" class="w-full p-2.5"><option>Código listo para copiar</option><option>Tabla</option><option>Markdown</option></select></div>
    </div>

    <div id="ui_mod_2" class="module-content hidden space-y-4">
        <h2 class="text-xl font-bold">Guiones (Super Retención)</h2>
        <div><label class="label-blue">Proyecto</label><select id="m2_marca" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option><option>TuIALista</option><option>Ezzenshop</option><option>Yayika Digital</option><option>Yayika Apparel</option></select></div>
        <div><label class="label-blue">Premisa o Noticia</label><textarea id="m2_premisa" class="w-full h-32 p-2.5"></textarea></div>
        <div><label class="label-blue">Longitud</label><select id="m2_longitud" class="w-full p-2.5"><option>Medio (1,500 palabras)</option><option>Extenso (4,500+ palabras)</option></select></div>
        <div><label class="label-blue">Framework</label><select id="m2_framework" class="w-full p-2.5"><option>Bucle Abierto</option><option>Análisis Lógico Deductivo</option></select></div>
    </div>

    <div id="ui_mod_3" class="module-content hidden space-y-4">
        <h2 class="text-xl font-bold">Micro-Hooks (Fragmentación)</h2>
        <div><label class="label-blue">Proyecto</label><select id="m3_marca" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option></select></div>
        <div><label class="label-blue">Dato de Choque</label><textarea id="m3_premisa" class="w-full h-24 p-2.5"></textarea></div>
        <div class="grid grid-cols-2 gap-4">
            <div><label class="label-blue">Duración</label><select id="m3_duracion" class="w-full p-2.5"><option>4 segundos</option><option>8 segundos</option></select></div>
            <div><label class="label-blue">Bloque</label><select id="m3_bloque" class="w-full p-2.5"><option>Bloque 1 (Inicio)</option><option>Bloque 2</option></select></div>
        </div>
        <div><label class="label-blue">Memoria de Continuidad</label><textarea id="m3_memoria" class="w-full h-24 p-2.5"></textarea></div>
    </div>

    <div id="ui_mod_4" class="module-content hidden space-y-4">
        <h2 class="text-xl font-bold">Empaquetado (CTR)</h2>
        <div><label class="label-blue">Enfoque</label><select id="m4_enfoque" class="w-full p-2.5"><option>Curiosidad/Secreto</option><option>Amenaza/Urgencia</option></select></div>
        <div><label class="label-blue">Estilo Imagen</label><select id="m4_estilo" class="w-full p-2.5"><option>Fotorrealismo</option><option>Terror Psicológico</option><option>Corporate Tech</option></select></div>
        <div><label class="label-blue">Guion Final</label><textarea id="m4_guion" class="w-full h-40 p-2.5"></textarea></div>
    </div>

    <div id="ui_mod_5" class="module-content hidden space-y-4">
        <h2 class="text-xl font-bold">Ventas UGC 9:16</h2>
        <div><label class="label-blue">Gatillo Psicológico</label><select id="m5_gatillo" class="w-full p-2.5"><option>FOMO y Escasez</option><option>Autoridad y Eficiencia</option></select></div>
        <div><label class="label-blue">Duración</label><select id="m5_duracion" class="w-full p-2.5"><option>4 segundos</option><option>8 segundos</option></select></div>
        <div><label class="label-blue">Modalidad</label><select id="m5_modalidad" class="w-full p-2.5"><option>Producto Solo</option><option>Influencer Sintético</option></select></div>
    </div>

    <div id="ui_mod_0" class="module-content hidden space-y-4">
        <h2 class="text-xl font-bold">ADN de Marca</h2>
        <div><label class="label-blue">Marca</label><select id="m0_selector" onchange="cargarADN()" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option><option>TuIALista</option><option>Ezzenshop</option><option>Yayika Digital</option><option>Yayika Apparel</option></select></div>
        <div><label class="label-blue">Arquetipo Voz</label><input type="text" id="m0_tono" class="w-full p-2.5"></div>
        <div><label class="label-blue">Límites Estrictos</label><textarea id="m0_reglas" class="w-full h-40 p-2.5"></textarea></div>
        <button onclick="guardarADN()" class="w-full bg-emerald-600 py-3 rounded font-bold hover:bg-emerald-500">GUARDAR ADN EN JSON</button>
    </div>

    <button onclick="ejecutar()" id="btn_main" class="w-full bg-[#2563eb] py-4 mt-2 rounded-lg font-bold text-xs tracking-widest hover:bg-blue-500">COMPILAR Y EJECUTAR</button>
</div>

<div class="flex-1 flex flex-col p-8 border-l border-slate-800 bg-[#0F1523]">
    <h3 class="text-[#10b981] font-bold text-[11px] mb-4 uppercase tracking-widest">Consola de Salida</h3>
    <textarea id="output" class="flex-1 w-full bg-transparent text-slate-300 font-mono text-sm leading-relaxed outline-none scrollbar-hide" readonly></textarea>
</div>

<script>
    let moduloActivo = 'mod_1';
    function switchTab(id) {
        moduloActivo = id;
        document.querySelectorAll('.module-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('ui_' + id).classList.remove('hidden');
        document.querySelectorAll('.active-tab').forEach(b => b.classList.replace('active-tab', 'inactive-tab'));
        document.getElementById('btn_' + id).classList.replace('inactive-tab', 'active-tab');
    }
    async function ejecutar() {
        const btn = document.getElementById('btn_main');
        btn.innerHTML = "PROCESANDO..."; btn.disabled = true;
        let datos = {};
        if(moduloActivo === 'mod_1') datos = { rol: document.getElementById('m1_rol').value, texto: document.getElementById('m1_texto').value, contexto: document.getElementById('m1_contexto').value, formato: document.getElementById('m1_formato').value };
        if(moduloActivo === 'mod_2') datos = { marca: document.getElementById('m2_marca').value, premisa: document.getElementById('m2_premisa').value, longitud: document.getElementById('m2_longitud').value, framework: document.getElementById('m2_framework').value };
        if(moduloActivo === 'mod_3') datos = { marca: document.getElementById('m3_marca').value, premisa: document.getElementById('m3_premisa').value, duracion: document.getElementById('m3_duracion').value, bloque: document.getElementById('m3_bloque').value, memoria: document.getElementById('m3_memoria').value };
        if(moduloActivo === 'mod_4') datos = { marca: document.getElementById('m2_marca').value, guion: document.getElementById('m4_guion').value, enfoque: document.getElementById('m4_enfoque').value, estilo: document.getElementById('m4_estilo').value, plataforma: 'YouTube' };
        if(moduloActivo === 'mod_5') datos = { gatillo: document.getElementById('m5_gatillo').value, duracion: document.getElementById('m5_duracion').value, bloque: '1', modalidad: document.getElementById('m5_modalidad').value };
        
        try {
            const res = await fetch('/api/ejecutar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({modulo_id: moduloActivo, datos: datos}) });
            const data = await res.json();
            document.getElementById('output').value = data.resultado_ia || data.error;
            if(window.actualizarTelemetria) window.actualizarTelemetria(); 
        } finally { btn.innerHTML = "COMPILAR Y EJECUTAR"; btn.disabled = false; }
    }
    async function cargarADN() {
        const res = await fetch('/api/get_adn'); const adn = await res.json();
        const marca = document.getElementById('m0_selector').value;
        if(adn[marca]) { document.getElementById('m0_tono').value = adn[marca].identidad || ''; document.getElementById('m0_reglas').value = adn[marca].reglas_duras || ''; }
    }
    async function guardarADN() {
        const marca = document.getElementById('m0_selector').value;
        const data = { identidad: document.getElementById('m0_tono').value, reglas_duras: document.getElementById('m0_reglas').value };
        await fetch('/api/save_adn', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({marca, adn: data}) });
        alert("ADN Guardado");
    }
    window.addEventListener('load', cargarADN);
</script>
{% endblock %}
