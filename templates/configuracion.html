{% extends "layout.html" %}
{% block content %}
<div class="flex-1 p-8 overflow-y-auto scrollbar-hide bg-[#0B1120]">
    <header class="mb-8 border-b border-slate-800 pb-4">
        <h2 class="text-2xl font-black text-white tracking-tighter uppercase">Bóveda de Configuración</h2>
        <p class="label-blue mt-1">Gestión de Credenciales y Nodos API</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-[#0F1523] p-6 rounded-xl border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Tanques API: Gemini (IA Engine)</h3>
                <span class="text-[9px] font-mono text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded">Failover Activo</span>
            </div>
            
            <p class="text-xs text-slate-500 mb-4">Ingrese hasta 5 API Keys. El sistema rotará automáticamente si una llave agota su cuota de procesamiento.</p>
            
            <form id="form_boveda" class="space-y-4">
                <div>
                    <label class="label-blue block mb-2">Llave Principal (Tanque 1)</label>
                    <input type="password" id="key_1" class="w-full p-3 text-sm font-mono bg-[#0B1120] border border-slate-700 rounded text-white focus:border-blue-500 outline-none placeholder-slate-600" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="label-blue block mb-2">Llave de Respaldo (Tanque 2)</label>
                    <input type="password" id="key_2" class="w-full p-3 text-sm font-mono bg-[#0B1120] border border-slate-700 rounded text-white focus:border-blue-500 outline-none placeholder-slate-600" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="label-blue block mb-2">Llave de Respaldo (Tanque 3)</label>
                    <input type="password" id="key_3" class="w-full p-3 text-sm font-mono bg-[#0B1120] border border-slate-700 rounded text-white focus:border-blue-500 outline-none placeholder-slate-600" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="label-blue block mb-2">Llave de Respaldo (Tanque 4)</label>
                    <input type="password" id="key_4" class="w-full p-3 text-sm font-mono bg-[#0B1120] border border-slate-700 rounded text-white focus:border-blue-500 outline-none placeholder-slate-600" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="label-blue block mb-2">Llave de Respaldo (Tanque 5)</label>
                    <input type="password" id="key_5" class="w-full p-3 text-sm font-mono bg-[#0B1120] border border-slate-700 rounded text-white focus:border-blue-500 outline-none placeholder-slate-600" placeholder="AIzaSy...">
                </div>
                
                <button type="button" onclick="guardarBoveda()" id="btn_guardar_boveda" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded shadow-lg shadow-emerald-900/40 uppercase text-xs tracking-widest transition-all mt-4">
                    Sincronizar Bóveda
                </button>
            </form>
        </div>
    </div>
</div>

<script>
async function cargarBoveda() {
    try {
        const res = await fetch('/api/get_boveda');
        const data = await res.json();
        const llaves = data.gemini_keys || [];
        
        for(let i = 0; i < 5; i++) {
            if(llaves[i]) document.getElementById(`key_${i+1}`).value = llaves[i];
        }
    } catch(e) { console.error("Error al cargar bóveda"); }
}

async function guardarBoveda() {
    const btn = document.getElementById('btn_guardar_boveda');
    let llaves_activas = [];
    
    for(let i = 1; i <= 5; i++) {
        const val = document.getElementById(`key_${i}`).value.trim();
        if(val) llaves_activas.push(val);
    }

    btn.innerHTML = "SINCRONIZANDO...";
    btn.classList.add('bg-slate-600');
    
    const res = await fetch('/api/save_boveda', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ gemini_keys: llaves_activas })
    });

    if(res.ok) {
        btn.innerHTML = "BÓVEDA SINCRONIZADA";
        btn.classList.remove('bg-slate-600');
        btn.classList.add('bg-emerald-600');
        setTimeout(() => { btn.innerHTML = "Sincronizar Bóveda"; }, 2000);
    }
}

window.onload = cargarBoveda;
</script>
{% endblock %}
