<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master System | Corporate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0F1523; border-right: 1px solid #1e293b; }
        .active-tab { border: 2px solid #3b82f6; background: rgba(59,130,246,0.1); border-radius: 8px; color: #f8fafc; font-weight: bold; }
        .inactive-tab { color: #94a3b8; border: 2px solid transparent; }
        input, select, textarea { background-color: #0B1120; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; outline: none; transition: border 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
        .label-blue { color: #60a5fa; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        /* Estilos de Telemetría */
        .telemetry-panel { background-color: #111827; border-left: 1px solid #1e293b; font-size: 0.75rem; }
        .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #10b981; margin-right: 6px; }
        .bar-bg { width: 100%; height: 6px; background-color: #334155; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .bar-fill { height: 100%; background-color: #10b981; width: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-[280px] sidebar flex flex-col p-5">
        <h1 class="text-xl font-bold text-[#3b82f6] mb-8 tracking-tight">AI Master System</h1>
        <nav class="flex-1 space-y-2">
            <button onclick="switchTab('mod_1')" id="btn_mod_1" class="w-full text-left px-4 py-3 text-sm active-tab">Mod 1: Traductor Universal</button>
            <button onclick="switchTab('mod_2')" id="btn_mod_2" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 2: Guiones (Retención)</button>
            <button onclick="switchTab('mod_3')" id="btn_mod_3" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 3: Micro-Hooks</button>
            <button onclick="switchTab('mod_4')" id="btn_mod_4" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 4: Empaquetado CTR</button>
            <button onclick="switchTab('mod_5')" id="btn_mod_5" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 5: Ventas UGC</button>
            <button onclick="switchTab('mod_0')" id="btn_mod_0" class="w-full text-left px-4 py-3 text-sm inactive-tab text-emerald-500 font-bold">Mod 0: ADN JSON</button>
        </nav>
    </aside>

    <main class="flex-1 flex bg-[#0B1120] overflow-hidden">
        <div class="w-[45%] flex flex-col p-8 gap-6 overflow-y-auto scrollbar-hide">
            
            <div id="ui_mod_1" class="module-content block space-y-4">
                <h2 class="text-2xl font-bold">Traductor Universal</h2>
                <div><label class="label-blue">Rol / Experto</label><select id="m1_rol" class="w-full p-2.5"><option>Ingeniero de Software</option><option>Analista de Datos</option><option>Asesor Estratégico</option><option>Perfil Ejecutivo Colaborativo</option></select></div>
                <div><label class="label-blue">Contexto</label><textarea id="m1_contexto" class="w-full h-24 p-2.5"></textarea></div>
                <div><label class="label-blue">Petición Humana</label><textarea id="m1_texto" class="w-full h-32 p-2.5"></textarea></div>
                <div><label class="label-blue">Formato</label><select id="m1_formato" class="w-full p-2.5"><option>Código listo para copiar</option><option>Tabla Comparativa</option><option>Markdown</option></select></div>
            </div>

            <div id="ui_mod_2" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Guiones (Super Retención)</h2>
                <div><label class="label-blue">Proyecto</label><select id="m2_marca" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option><option>TuIALista</option><option>Ezzenshop</option><option>Yayika Digital</option><option>Yayika Apparel</option></select></div>
                <div><label class="label-blue">Premisa o Noticia</label><textarea id="m2_premisa" class="w-full h-32 p-2.5"></textarea></div>
                <div><label class="label-blue">Longitud</label><select id="m2_longitud" class="w-full p-2.5"><option>Medio (1,500 palabras)</option><option>Extenso (4,500+ palabras)</option></select></div>
                <div><label class="label-blue">Framework</label><select id="m2_framework" class="w-full p-2.5"><option>Bucle Abierto</option><option>Análisis Lógico Deductivo</option></select></div>
            </div>

            <div id="ui_mod_3" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Micro-Hooks (Fragmentación)</h2>
                <div><label class="label-blue">Proyecto</label><select id="m3_marca" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option><option>TuIALista</option><option>Ezzenshop</option><option>Yayika Digital</option><option>Yayika Apparel</option></select></div>
                <div><label class="label-blue">Premisa o Dato de Choque</label><textarea id="m3_premisa" class="w-full h-24 p-2.5"></textarea></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="label-blue">Duración</label><select id="m3_duracion" class="w-full p-2.5"><option>4 segundos</option><option>5 segundos</option><option>8 segundos</option></select></div>
                    <div><label class="label-blue">Bloque</label><select id="m3_bloque" class="w-full p-2.5"><option>Bloque 1 (Inicio)</option><option>Bloque 2</option><option>Bloque 3</option><option>Bloque 4</option><option>Bloque 5</option></select></div>
                </div>
                <div><label class="label-blue">Memoria de Continuidad (Raccord)</label><textarea id="m3_memoria" class="w-full h-24 p-2.5" placeholder="Pega el prompt y texto del bloque anterior"></textarea></div>
            </div>

            <div id="ui_mod_4" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Empaquetado (CTR Extremo)</h2>
                <div><label class="label-blue">Enfoque Título</label><select id="m4_enfoque" class="w-full p-2.5"><option>Amenaza/Urgencia</option><option>Curiosidad/Secreto</option><option>Contraste/Anomalía</option></select></div>
                <div><label class="label-blue">Estilo Imagen</label><select id="m4_estilo" class="w-full p-2.5"><option>Fotorrealismo Cinematográfico</option><option>Terror Psicológico</option><option>Fotoperiodismo Crudo B/N</option><option>Corporate Tech Limpio</option></select></div>
                <div><label class="label-blue">Guion Final</label><textarea id="m4_guion" class="w-full h-40 p-2.5"></textarea></div>
            </div>

            <div id="ui_mod_5" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Ventas UGC 9:16</h2>
                <div><label class="label-blue">Gatillo Psicológico</label><select id="m5_gatillo" class="w-full p-2.5"><option>FOMO y Escasez</option><option>Autoridad y Eficiencia</option></select></div>
                <div><label class="label-blue">Duración</label><select id="m5_duracion" class="w-full p-2.5"><option>4 segundos</option><option>8 segundos</option></select></div>
                <div><label class="label-blue">Modalidad</label><select id="m5_modalidad" class="w-full p-2.5"><option>Producto Solo</option><option>Influencer Sintético</option></select></div>
            </div>

            <div id="ui_mod_0" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">ADN de Marca (Módulo 0)</h2>
                <div><label class="label-blue">Marca</label><select id="m0_selector" onchange="cargarADN()" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option><option>TuIALista</option><option>Ezzenshop</option><option>Yayika Digital</option><option>Yayika Apparel</option></select></div>
                <div><label class="label-blue">Arquetipo Voz</label><input type="text" id="m0_tono" class="w-full p-2.5"></div>
                <div><label class="label-blue">Límites Estrictos</label><textarea id="m0_reglas" class="w-full h-40 p-2.5"></textarea></div>
                <button onclick="guardarADN()" class="w-full bg-emerald-600 py-3 rounded font-bold transition-colors hover:bg-emerald-500">GUARDAR ADN EN JSON</button>
            </div>

            <button onclick="ejecutar()" id="btn_main" class="w-full bg-[#2563eb] py-4 mt-2 rounded-lg font-bold text-xs tracking-widest transition-all shadow-lg hover:bg-blue-500">COMPILAR Y EJECUTAR</button>
        </div>

        <div class="flex-1 flex flex-col glass-panel p-8 shadow-2xl relative border-l border-slate-800">
            <h3 class="text-[#10b981] font-bold text-[11px] mb-4 uppercase tracking-widest">Consola de Salida</h3>
            <textarea id="output" class="flex-1 w-full bg-transparent text-slate-300 font-mono text-sm leading-relaxed outline-none scrollbar-hide" readonly></textarea>
        </div>

        <div class="w-[240px] telemetry-panel p-5 flex flex-col space-y-6">
            <h3 class="text-[#f8fafc] font-bold text-xs uppercase tracking-widest mb-2 border-b border-slate-700 pb-2">Data Visualization</h3>
            
            <div>
                <div class="flex items-center text-[#10b981] mb-2"><span class="status-indicator" id="ind_system"></span> System: <span id="tel_system" class="ml-1 font-bold">ACTIVE</span></div>
                <div class="flex items-center text-[#10b981] mb-2"><span class="status-indicator" id="ind_api"></span> API: <span id="tel_api" class="ml-1 font-bold">STABLE</span></div>
                <div class="flex items-center text-slate-400 mb-2"><span class="status-indicator bg-purple-500"></span> Uptime: <span id="tel_uptime" class="ml-1">0m 0s</span></div>
                <div class="flex items-center text-slate-400"><span class="status-indicator bg-blue-500"></span> Latency: <span id="tel_latency" class="ml-1">0.0s</span></div>
            </div>

            <div class="mt-4">
                <div class="flex justify-between text-[10px] text-slate-400 mb-1"><span>Tokens Used</span><span id="tel_tokens">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="bar_tokens" style="width: 2%;"></div></div>
            </div>
            
            <div class="mt-auto border-t border-slate-700 pt-4">
                <button onclick="actualizarTelemetria()" class="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded text-[10px] text-slate-300 font-bold border border-slate-600 transition-colors">+ Refresh Data</button>
            </div>
        </div>
    </main>

    <script>
        let moduloActivo = 'mod_1';
        function switchTab(id) {
            moduloActivo = id;
            document.querySelectorAll('.module-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('ui_' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('active-tab', 'inactive-tab'));
            document.getElementById('btn_' + id).classList.replace('inactive-tab', 'active-tab');
        }
        async function ejecutar() {
            const btn = document.getElementById('btn_main');
            btn.innerHTML = "PROCESANDO..."; btn.disabled = true;
            let datos = {};
            if(moduloActivo === 'mod_1') datos = { rol: document.getElementById('m1_rol').value, texto: document.getElementById('m1_texto').value, contexto: document.getElementById('m1_contexto').value, formato: document.getElementById('m1_formato').value };
            if(moduloActivo === 'mod_2') datos = { marca: document.getElementById('m2_marca').value, premisa: document.getElementById('m2_premisa').value, longitud: document.getElementById('m2_longitud').value, framework: document.getElementById('m2_framework').value };
            if(moduloActivo === 'mod_3') datos = { marca: document.getElementById('m3_marca').value, premisa: document.getElementById('m3_premisa').value, duracion: document.getElementById('m3_duracion').value, bloque: document.getElementById('m3_bloque').value, memoria: document.getElementById('m3_memoria').value };
            if(moduloActivo === 'mod_4') datos = { marca: document.getElementById('m2_marca').value, guion: document.getElementById('m4_guion').value, enfoque: document.getElementById('m4_enfoque').value, estilo: document.getElementById('m4_estilo').value, plataforma: 'YouTube' };
            if(moduloActivo === 'mod_5') datos = { gatillo: document.getElementById('m5_gatillo').value, duracion: document.getElementById('m5_duracion').value, bloque: '1', modalidad: document.getElementById('m5_modalidad').value };
            
            try {
                const res = await fetch('/api/ejecutar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({modulo_id: moduloActivo, datos: datos}) });
                const data = await res.json();
                document.getElementById('output').value = data.resultado_ia || data.error;
                actualizarTelemetria(); // Fuerza actualización visual al terminar
            } finally { btn.innerHTML = "COMPILAR Y EJECUTAR"; btn.disabled = false; }
        }
        async function cargarADN() {
            const res = await fetch('/api/get_adn'); const adn = await res.json();
            const marca = document.getElementById('m0_selector').value;
            if(adn[marca]) {
                document.getElementById('m0_tono').value = adn[marca].identidad || '';
                document.getElementById('m0_reglas').value = adn[marca].reglas_duras || '';
            }
        }
        async function guardarADN() {
            const marca = document.getElementById('m0_selector').value;
            const data = { identidad: document.getElementById('m0_tono').value, reglas_duras: document.getElementById('m0_reglas').value };
            await fetch('/api/save_adn', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({marca, adn: data}) });
            alert("ADN JSON Actualizado");
        }
        
        // SCRIPT DE TELEMETRÍA (NUEVA ADICIÓN)
        async function actualizarTelemetria() {
            try {
                const res = await fetch('/api/telemetria');
                const data = await res.json();
                
                document.getElementById('tel_uptime').innerText = data.uptime;
                document.getElementById('tel_latency').innerText = data.latencia;
                document.getElementById('tel_tokens').innerText = data.tokens.toLocaleString();
                
                const apiEl = document.getElementById('tel_api');
                const indApi = document.getElementById('ind_api');
                apiEl.innerText = data.api_status;
                if(data.api_status === 'OFFLINE') {
                    apiEl.classList.replace('text-[#10b981]', 'text-red-500');
                    indApi.classList.replace('bg-[#10b981]', 'bg-red-500');
                }
                
                // Animación simple de barra de tokens
                let percentage = (data.tokens % 100000) / 1000; 
                document.getElementById('bar_tokens').style.width = Math.min(Math.max(percentage, 2), 100) + '%';
                
            } catch(e) { console.error("Falla al conectar con telemetría."); }
        }
        
        window.onload = () => { cargarADN(); actualizarTelemetria(); setInterval(actualizarTelemetria, 10000); };
    </script>
</body></html>
