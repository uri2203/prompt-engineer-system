<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AI Master System | Corporate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0F1523; border-right: 1px solid #1e293b; }
        .active-tab { border: 2px solid #3b82f6; background: rgba(59,130,246,0.1); border-radius: 8px; color: #f8fafc; }
        .inactive-tab { color: #94a3b8; border: 2px solid transparent; }
        input, select, textarea { background-color: #0B1120; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; outline: none; }
        .label-blue { color: #60a5fa; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-[280px] sidebar flex flex-col p-5">
        <h1 class="text-xl font-bold text-[#3b82f6] mb-8">AI Master System</h1>
        <nav class="flex-1 space-y-2 text-xs font-bold uppercase tracking-tighter">
            <button onclick="switchTab('mod_1')" id="btn_mod_1" class="w-full text-left px-4 py-3 active-tab">Mod 1: Traductor Universal</button>
            <button onclick="switchTab('mod_2')" id="btn_mod_2" class="w-full text-left px-4 py-3 inactive-tab">Mod 2: Guiones (Super Retención)</button>
            <button onclick="switchTab('mod_0')" id="btn_mod_0" class="w-full text-left px-4 py-3 inactive-tab text-emerald-500">Mod 0: ADN Proyectos</button>
        </nav>
    </aside>

    <main class="flex-1 flex p-8 gap-6 bg-[#0B1120] overflow-hidden">
        <div class="w-[55%] flex flex-col gap-6 overflow-y-auto pr-2">
            
            <div id="ui_mod_1" class="module-content block">
                <h2 class="text-2xl font-bold mb-4">Módulo 1: Traductor Universal</h2>
                <div class="space-y-4">
                    <div>
                        <label class="label-blue">Rol / Experto</label>
                        <select id="m1_rol" class="w-full p-2.5">
                            <option>Ingeniero de Software</option>
                            <option>Analista de Datos</option>
                            <option>Asesor Estratégico</option>
                            <option>Perfil Ejecutivo Colaborativo</option>
                        </select>
                    </div>
                    <div><label class="label-blue">Contexto (Variables)</label><textarea id="m1_contexto" class="w-full h-24 p-2.5" placeholder="Datos clave del proyecto..."></textarea></div>
                    <div><label class="label-blue">Petición Humana</label><textarea id="m1_texto" class="w-full h-32 p-2.5" placeholder="¿Qué necesitas exactamente?"></textarea></div>
                    <div>
                        <label class="label-blue">Formato de Salida</label>
                        <select id="m1_formato" class="w-full p-2.5">
                            <option>Código listo para copiar</option>
                            <option>Tabla Comparativa</option>
                            <option>Documento Formal</option>
                            <option>Markdown</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="ui_mod_2" class="module-content hidden">
                <h2 class="text-2xl font-bold mb-4">Módulo 2: Ingeniería de Guiones</h2>
                <div class="space-y-4">
                    <div><label class="label-blue">Proyecto / Marca</label><select id="m2_marca" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option></select></div>
                    <div><label class="label-blue">Premisa o Noticia Base</label><textarea id="m2_premisa" class="w-full h-32 p-2.5"></textarea></div>
                    <div><label class="label-blue">Longitud Estimada</label><select id="m2_longitud" class="w-full p-2.5"><option>Medio (1,500 palabras)</option><option>Extenso/Documental (4,500+ palabras)</option></select></div>
                </div>
            </div>

            <button onclick="ejecutar()" id="btn_main" class="w-full bg-[#2563eb] hover:bg-blue-500 py-4 mt-2 rounded-lg font-bold text-xs tracking-widest transition-all">COMPILAR Y EJECUTAR</button>
        </div>
        <div class="w-[45%] flex flex-col glass-panel p-6 shadow-2xl">
            <h3 class="text-[#10b981] font-bold text-[11px] uppercase mb-4 tracking-widest">Output Blindado</h3>
            <textarea id="output" class="flex-1 w-full bg-transparent text-slate-300 font-mono text-sm leading-relaxed outline-none" readonly></textarea>
        </div>
    </main>
    <script>
        let moduloActivo = 'mod_1';
        function switchTab(id) {
            moduloActivo = id;
            document.querySelectorAll('.module-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('ui_' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('active-tab', 'inactive-tab'));
            document.getElementById('btn_' + id).classList.replace('inactive-tab', 'active-tab');
        }
    </script>
</body></html>
