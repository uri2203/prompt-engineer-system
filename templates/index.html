<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master System | Corporate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0F1523; border-right: 1px solid #1e293b; }
        .active-tab { border: 2px solid #3b82f6; background: rgba(59,130,246,0.1); border-radius: 8px; color: #f8fafc; font-weight: bold; }
        .inactive-tab { color: #94a3b8; border: 2px solid transparent; }
        input, select, textarea { background-color: #0B1120; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; outline: none; }
        .label-blue { color: #60a5fa; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-[280px] sidebar flex flex-col p-5">
        <h1 class="text-xl font-bold text-[#3b82f6] mb-8 tracking-tight">AI Master System</h1>
        <nav class="flex-1 space-y-2">
            <button onclick="switchTab('mod_1')" id="btn_mod_1" class="w-full text-left px-4 py-3 text-sm active-tab">Mod 1: Traductor Universal</button>
            <button onclick="switchTab('mod_2')" id="btn_mod_2" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 2: Guiones (Super Retención)</button>
            <button onclick="switchTab('mod_4')" id="btn_mod_4" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 4: Empaquetado CTR</button>
            <button onclick="switchTab('mod_5')" id="btn_mod_5" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 5: Ventas UGC</button>
            <button onclick="switchTab('mod_0')" id="btn_mod_0" class="w-full text-left px-4 py-3 text-sm inactive-tab text-emerald-500 font-bold">Mod 0: ADN JSON</button>
        </nav>
    </aside>

    <main class="flex-1 flex p-8 gap-6 bg-[#0B1120] overflow-hidden">
        <div class="w-[55%] flex flex-col gap-6 overflow-y-auto pr-2 scrollbar-hide">
            
            <div id="ui_mod_1" class="module-content block space-y-4">
                <h2 class="text-2xl font-bold">Traductor Universal</h2>
                <div><label class="label-blue">Rol / Experto</label><select id="m1_rol" class="w-full p-2.5"><option>Ingeniero de Software</option><option>Analista de Datos</option><option>Asesor Estratégico</option><option>Perfil Ejecutivo Colaborativo</option></select></div>
                <div><label class="label-blue">Contexto</label><textarea id="m1_contexto" class="w-full h-24 p-2.5"></textarea></div>
                <div><label class="label-blue">Petición Humana</label><textarea id="m1_texto" class="w-full h-32 p-2.5"></textarea></div>
                <div><label class="label-blue">Formato</label><select id="m1_formato" class="w-full p-2.5"><option>Código listo para copiar</option><option>Tabla Comparativa</option><option>Markdown</option></select></div>
            </div>

            <div id="ui_mod_2" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Guiones (Super Retención)</h2>
                <div><label class="label-blue">Proyecto</label><select id="m2_marca" class="w-full p-2.5"><option>La Viuda</option><option>Monkygraff</option></select></div>
                <div><label class="label-blue">Premisa</label><textarea id="m2_premisa" class="w-full h-32 p-2.5"></textarea></div>
                <div><label class="label-blue">Longitud</label><select id="m2_longitud" class="w-full p-2.5"><option>Medio (1,500 palabras)</option><option>Extenso (4,500+ palabras)</option></select></div>
            </div>

            <div id="ui_mod_4" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Empaquetado (CTR Extremo)</h2>
                <div><label class="label-blue">Enfoque Título</label><select id="m4_enfoque" class="w-full p-2.5"><option>Amenaza/Urgencia</option><option>Curiosidad/Secreto</option><option>Contraste/Anomalía</option></select></div>
                <div><label class="label-blue">Estilo Imagen</label><select id="m4_estilo" class="w-full p-2.5"><option>Fotorrealismo Cinematográfico</option><option>Terror Psicológico</option><option>Fotoperiodismo Crudo B/N</option><option>Corporate Tech Limpio</option></select></div>
                <div><label class="label-blue">Guion Final</label><textarea id="m4_guion" class="w-full h-40 p-2.5"></textarea></div>
            </div>

            <div id="ui_mod_5" class="module-content hidden space-y-4">
                <h2 class="text-2xl font-bold">Ventas UGC 9:16</h2>
                <div><label class="label-blue">Gatillo</label><select id="m5_gatillo" class="w-full p-2.5"><option>FOMO y Escasez</option><option>Autoridad y Eficiencia</option></select></div>
                <div><label class="label-blue">Duración</label><select id="m5_duracion" class="w-full p-2.5"><option>4 segundos</option><option>8 segundos</option></select></div>
            </div>

            <button onclick="ejecutar()" id="btn_main" class="w-full bg-[#2563eb] py-4 mt-2 rounded-lg font-bold text-xs tracking-widest transition-all shadow-lg">COMPILAR Y EJECUTAR</button>
        </div>

        <div class="w-[45%] flex flex-col glass-panel p-6 shadow-2xl">
            <h3 class="text-[#10b981] font-bold text-[11px] mb-4 uppercase tracking-widest">Consola de Salida</h3>
            <textarea id="output" class="flex-1 w-full bg-transparent text-slate-300 font-mono text-sm leading-relaxed outline-none scrollbar-hide" readonly></textarea>
        </div>
    </main>

    <script>
        let moduloActivo = 'mod_1';
        function switchTab(id) {
            moduloActivo = id;
            document.querySelectorAll('.module-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('ui_' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('active-tab', 'inactive-tab'));
            document.getElementById('btn_' + id).classList.replace('inactive-tab', 'active-tab');
        }
        async function ejecutar() {
            const btn = document.getElementById('btn_main');
            btn.innerHTML = "PROCESANDO..."; btn.disabled = true;
            let datos = {};
            if(moduloActivo === 'mod_1') datos = { rol: document.getElementById('m1_rol').value, texto: document.getElementById('m1_texto').value, contexto: document.getElementById('m1_contexto').value, formato: document.getElementById('m1_formato').value };
            if(moduloActivo === 'mod_2') datos = { marca: document.getElementById('m2_marca').value, premisa: document.getElementById('m2_premisa').value, longitud: document.getElementById('m2_longitud').value };
            if(moduloActivo === 'mod_4') datos = { marca: document.getElementById('m2_marca').value, guion: document.getElementById('m4_guion').value, enfoque: document.getElementById('m4_enfoque').value, estilo: document.getElementById('m4_estilo').value, plataforma: 'YouTube' };
            if(moduloActivo === 'mod_5') datos = { gatillo: document.getElementById('m5_gatillo').value, duracion: document.getElementById('m5_duracion').value, bloque: '1', modalidad: 'Producto Solo' };
            
            try {
                const res = await fetch('/api/ejecutar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({modulo_id: moduloActivo, datos: datos}) });
                const data = await res.json();
                document.getElementById('output').value = data.resultado_ia || data.error;
            } finally { btn.innerHTML = "COMPILAR Y EJECUTAR"; btn.disabled = false; }
        }
    </script>
</body></html>
