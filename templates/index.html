<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt System | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; border-color: #3b82f6; }
        .inactive-tab { background-color: #1e293b; color: #94a3b8; border-color: #334155; }
        textarea, input, select { background-color: #0f172a; border: 1px solid #334155; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen flex h-screen overflow-hidden">

    <aside class="w-72 glass-panel border-r flex flex-col p-4 shadow-xl z-10">
        <div class="mb-8 mt-2 px-2 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-blue-400">AI Prompt System</h1>
                <p class="text-[10px] text-slate-500 uppercase font-semibold">Arquitectura Modular</p>
            </div>
            <a href="/logout" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded hover:bg-red-800/50">SALIR</a>
        </div>
        
        <nav class="flex-1 space-y-3">
            <button onclick="switchTab('mod_1_universal')" id="btn_mod_1_universal" class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium active-tab">Mod 1: Universal</button>
            <button onclick="switchTab('mod_2_guiones')" id="btn_mod_2_guiones" class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium inactive-tab">Mod 2: Guiones</button>
            <button onclick="switchTab('mod_3_hooks')" id="btn_mod_3_hooks" class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium inactive-tab">Mod 3: Micro-Hooks</button>
            <button onclick="switchTab('mod_4_empaquetado')" id="btn_mod_4_empaquetado" class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium inactive-tab">Mod 4: Metadatos</button>
            <button onclick="switchTab('mod_5_ugc_ventas')" id="btn_mod_5_ugc_ventas" class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium inactive-tab">Mod 5: UGC & Ventas</button>
        </nav>

        <div id="admin_section" class="mt-6 p-4 bg-slate-900/80 rounded-lg border border-blue-900/50 hidden">
            <p class="text-[10px] text-blue-400 font-bold uppercase mb-2">Registrar Colaborador</p>
            <input type="text" id="new_user" placeholder="Usuario" class="w-full p-2 mb-2 rounded bg-slate-950 text-xs text-white">
            <input type="password" id="new_pass" placeholder="Password" class="w-full p-2 mb-2 rounded bg-slate-950 text-xs text-white">
            <button onclick="registrarUsuario()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold py-2 rounded">CREAR ACCESO</button>
        </div>
    </aside>

    <main class="flex-1 flex overflow-hidden bg-[#0B1120] p-8 gap-8">
        <div class="w-1/2 flex flex-col gap-6 overflow-y-auto pr-4" id="forms_container">
            <div id="form_mod_1_universal" class="form-module block">
                <h2 class="text-2xl font-semibold mb-6">Traductor Universal</h2>
                <input type="text" id="m1_rol" class="w-full p-3 rounded-lg mb-4" placeholder="Rol del experto">
                <textarea id="m1_peticion" class="w-full h-32 p-3 rounded-lg" placeholder="¿Qué necesitas?"></textarea>
            </div>
            <button id="btn_ejecutar" onclick="procesarPeticion()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-4">EJECUTAR</button>
        </div>

        <div class="w-1/2 flex flex-col glass-panel rounded-xl p-6">
            <h3 class="text-xs font-bold text-emerald-400 uppercase mb-4">Resultado de IA</h3>
            <textarea id="ai_output" class="flex-1 w-full bg-[#0a0f18] p-6 text-emerald-300 font-mono text-sm resize-none" readonly></textarea>
        </div>
    </main>

    <script>
        // Lógica para mostrar panel de admin
        const isAdmin = {{ 'true' if is_admin else 'false' }};
        if(isAdmin) document.getElementById('admin_section').classList.remove('hidden');

        let moduloActivo = 'mod_1_universal';

        async function registrarUsuario() {
            const user = document.getElementById('new_user').value;
            const pass = document.getElementById('new_pass').value;
            const res = await fetch('/api/registrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        async function procesarPeticion() {
            // Lógica de fetch a /api/ejecutar idéntica a la anterior
        }

        function switchTab(id) {
            moduloActivo = id;
            // Lógica de pestañas idéntica a la anterior
        }
    </script>
</body>
</html>
