<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>AI Master System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0F1523; border-right: 1px solid #1e293b; }
        .active-tab { border: 2px solid #3b82f6; background: rgba(59,130,246,0.1); border-radius: 8px; }
        input, select, textarea { background-color: #0B1120; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; outline: none; }
        .label-blue { color: #60a5fa; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-[280px] sidebar flex flex-col p-5">
        <h1 class="text-xl font-bold text-[#3b82f6] mb-8">AI Master System</h1>
        <nav class="flex-1 space-y-2">
            <button onclick="switchTab('mod_1')" id="btn_mod_1" class="w-full text-left px-4 py-3 text-sm active-tab font-bold">Mod 1: Traductor</button>
            <button onclick="switchTab('mod_2')" id="btn_mod_2" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 2: Guiones</button>
            <button onclick="switchTab('mod_5')" id="btn_mod_5" class="w-full text-left px-4 py-3 text-sm inactive-tab">Mod 5: Ventas UGC</button>
        </nav>
    </aside>
    <main class="flex-1 flex p-8 gap-6 bg-[#0B1120]">
        <div class="w-[55%] flex flex-col gap-6 overflow-y-auto">
            <div id="ui_mod_1" class="module-content block">
                <label class="label-blue">Rol / Experto</label>
                <select id="m1_rol" class="w-full p-2.5 mb-4"><option>Ingeniero de Software</option><option>Asesor Estratégico</option></select>
                <label class="label-blue">Petición Humana</label>
                <textarea id="m1_texto" class="w-full h-32 p-2.5 mb-4"></textarea>
                <button onclick="ejecutar()" class="w-full bg-[#2563eb] py-4 rounded font-bold">EJECUTAR</button>
            </div>
            </div>
        <textarea id="output" class="w-[45%] bg-[#0F1523] p-6 text-slate-300 font-mono text-sm border border-slate-800 rounded-xl" readonly></textarea>
    </main>
    <script>
        let moduloActivo = 'mod_1';
        function switchTab(id) {
            moduloActivo = id;
            document.querySelectorAll('.module-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('ui_' + id).classList.remove('hidden');
        }
        async function ejecutar() {
            const payload = { modulo_id: moduloActivo, datos: { rol: document.getElementById('m1_rol').value, texto: document.getElementById('m1_texto').value } };
            const res = await fetch('/api/ejecutar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            document.getElementById('output').value = data.resultado_ia || data.error;
        }
    </script>
</body></html>
