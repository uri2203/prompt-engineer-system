<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinpinela - Acceso Restringido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070B14; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-[#070B14] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-[#070B14] to-[#070B14]">
    <div class="bg-[#0F1523] border border-slate-800 p-10 rounded-2xl shadow-2xl w-full max-w-md relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-emerald-500"></div>
        
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase mb-1">Pinpinela</h1>
            <p class="text-slate-500 text-[10px] font-mono uppercase tracking-widest">Motor de Renderizado • Acceso Nivel 1</p>
        </div>

        {% if error %}
        <div class="bg-red-900/30 border border-red-500/50 text-red-400 p-3 rounded mb-6 text-[10px] font-bold uppercase tracking-widest text-center animate-pulse">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
            <div>
                <label class="text-[9px] text-slate-400 font-bold uppercase block mb-2 tracking-widest">ID de Operador</label>
                <input type="text" name="username" required autocomplete="off" class="w-full bg-[#0B1120] border border-slate-700 p-3 rounded text-white outline-none text-sm focus:border-blue-500 transition-colors font-mono placeholder-slate-600" placeholder="Ej. admin">
            </div>
            <div>
                <label class="text-[9px] text-slate-400 font-bold uppercase block mb-2 tracking-widest">Clave de Autorización</label>
                <input type="password" name="password" required class="w-full bg-[#0B1120] border border-slate-700 p-3 rounded text-white outline-none text-sm focus:border-blue-500 transition-colors font-mono placeholder-slate-600" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded font-black text-[11px] uppercase tracking-widest transition-all shadow-lg shadow-blue-900/40 mt-4">
                INICIAR ENLACE SEGURO
            </button>
        </form>
        
        <div class="mt-8 text-center border-t border-slate-800 pt-4">
            <span class="text-slate-600 text-[9px] font-mono uppercase tracking-widest flex items-center justify-center">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-2 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                Servidor Encriptado
            </span>
        </div>
    </div>
</body>
</html>
