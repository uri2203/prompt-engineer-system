<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso | Pinpinela</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B1120] flex items-center justify-center h-screen">
    <div class="bg-[#0F1523] p-10 rounded-xl border border-slate-800 shadow-2xl w-96">
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded flex items-center justify-center font-black text-white text-xl shadow-lg mb-4">P</div>
            <h1 class="text-white font-black tracking-tighter text-2xl uppercase">Pinpinela</h1>
            <p class="text-slate-500 text-[10px] tracking-widest uppercase mt-2 font-bold">Protocolo de Acceso</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-2 block">Usuario</label>
                <input type="text" name="username" required class="w-full bg-[#1e293b] border border-slate-700 rounded p-3 text-white focus:outline-none focus:border-blue-500 transition-all">
            </div>
            <div>
                <label class="text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-2 block">Contraseña</label>
                <input type="password" name="password" required class="w-full bg-[#1e293b] border border-slate-700 rounded p-3 text-white focus:outline-none focus:border-blue-500 transition-all">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition-colors uppercase text-xs tracking-widest">
                Autenticar
            </button>
        </form>
    </div>
</body>
</html>
