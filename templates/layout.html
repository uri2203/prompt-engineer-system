<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinpinela - Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070B14; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex text-slate-200 overflow-hidden">

    <aside class="w-20 lg:w-64 bg-[#0F1523] border-r border-slate-800 flex flex-col justify-between transition-all duration-300 z-20">
        <div>
            <div class="h-20 flex items-center justify-center lg:justify-start lg:px-6 border-b border-slate-800">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-black text-white shadow-lg shadow-blue-900/50">
                    P
                </div>
                <span class="hidden lg:block ml-3 font-black tracking-tighter text-lg uppercase">Pinpinela</span>
            </div>
            
            <nav class="p-4 space-y-2">
                <a href="{{ url_for('index') }}" class="flex items-center p-3 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400 hover:text-white group {% if active_page == 'workspace' %}bg-slate-800/80 text-blue-400{% endif %}">
                    <span class="text-xl">⌂</span>
                    <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Workspace</span>
                </a>
                <a href="{{ url_for('bot') }}" class="flex items-center p-3 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400 hover:text-white group {% if active_page == 'bot' %}bg-slate-800/80 text-blue-400{% endif %}">
                    <span class="text-xl">⚡</span>
                    <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Orquestador</span>
                </a>
                <a href="{{ url_for('adn') }}" class="flex items-center p-3 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400 hover:text-white group {% if active_page == 'adn' %}bg-slate-800/80 text-blue-400{% endif %}">
                    <span class="text-xl">🧬</span>
                    <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Matriz ADN</span>
                </a>
                
                <div class="pt-4 mt-4 border-t border-slate-800/50">
                    <p class="hidden lg:block text-[8px] font-mono uppercase tracking-widest text-slate-600 mb-2 px-3">Administración</p>
                    
                    <a href="{{ url_for('usuarios') }}" class="flex items-center p-3 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400 hover:text-white group {% if active_page == 'usuarios' %}bg-slate-800/80 text-blue-400{% endif %}">
                        <span class="text-xl">👤</span>
                        <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Usuarios</span>
                    </a>
                    <a href="{{ url_for('configuracion') }}" class="flex items-center p-3 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400 hover:text-white group {% if active_page == 'configuracion' %}bg-slate-800/80 text-blue-400{% endif %}">
                        <span class="text-xl">⚙️</span>
                        <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Bóveda API</span>
                    </a>
                    <a href="{{ url_for('mantenimiento') }}" class="flex items-center p-3 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400 hover:text-white group {% if active_page == 'mantenimiento' %}bg-slate-800/80 text-emerald-400{% endif %}">
                        <span class="text-xl">📟</span>
                        <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Auditoría</span>
                    </a>
                </div>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800">
            <a href="{{ url_for('logout') }}" class="flex items-center p-3 rounded-lg hover:bg-red-900/30 transition-colors text-slate-500 hover:text-red-400 group">
                <span class="text-xl">🚪</span>
                <span class="hidden lg:block ml-3 text-[10px] font-bold uppercase tracking-widest">Desconectar</span>
            </a>
            <div class="hidden lg:flex items-center mt-4 px-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-2 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                <span class="text-[8px] font-mono text-slate-500 uppercase tracking-widest">Sistema Operativo</span>
            </div>
        </div>
    </aside>

    {% block content %}{% endblock %}

</body>
</html>
