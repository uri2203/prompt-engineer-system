<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master System | Corporate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0B1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0F1523; border-right: 1px solid #1e293b; transition: width 0.3s ease; }
        
        .nav-icon { display: flex; justify-content: center; align-items: center; width: 100%; padding: 1.25rem 0; color: #64748b; border-left: 3px solid transparent; transition: all 0.2s; position: relative; }
        .nav-icon:hover { background-color: #1e293b; color: #f8fafc; cursor: pointer; }
        .nav-icon.active { border-left-color: #3b82f6; background-color: rgba(59,130,246,0.1); color: #3b82f6; }
        .nav-icon svg { width: 24px; height: 24px; }
        
        .telemetry-panel { background-color: #0F1523; border-left: 1px solid #1e293b; font-size: 0.75rem; }
        .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #10b981; margin-right: 6px; }
        .chart-container { position: relative; height: 60px; width: 100%; margin-bottom: 0.75rem; border-bottom: 1px solid #1e293b; padding-bottom: 0.5rem; }
        
        input, select, textarea { background-color: #0B1120; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; outline: none; transition: border 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
        .label-blue { color: #60a5fa; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    
    <aside class="w-[80px] sidebar flex flex-col items-center py-6 z-50 shadow-2xl">
        <div class="w-12 h-12 bg-[#2563eb] rounded-xl flex items-center justify-center font-black text-white mb-8 shadow-lg shadow-blue-900/50 tracking-tighter text-xl">
            AI
        </div>
        
        <nav class="flex-1 flex flex-col w-full space-y-2 mt-4">
            <a href="/" class="nav-icon group {% if active_page == 'workspace' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="absolute left-20 bg-slate-800 text-white px-3 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-xl whitespace-nowrap pointer-events-none">Workspace (IA)</span>
            </a>
            
            <a href="/adn" class="nav-icon group {% if active_page == 'adn' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="absolute left-20 bg-slate-800 text-white px-3 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-xl whitespace-nowrap pointer-events-none">ADN Manager</span>
            </a>
            
            <a href="/usuarios" class="nav-icon group {% if active_page == 'usuarios' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="absolute left-20 bg-slate-800 text-white px-3 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-xl whitespace-nowrap pointer-events-none">Control Usuarios</span>
            </a>
            
            <a href="/mantenimiento" class="nav-icon group {% if active_page == 'logs' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                <span class="absolute left-20 bg-slate-800 text-white px-3 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-xl whitespace-nowrap pointer-events-none">Auditoría / Logs</span>
            </a>
            
            <a href="/bot" class="nav-icon group text-emerald-500 {% if active_page == 'bot' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                <span class="absolute left-20 bg-emerald-700 text-white px-3 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-xl whitespace-nowrap pointer-events-none">Bot Pinpinela 24/7</span>
            </a>
            
            <div class="mt-auto mb-2 border-t border-slate-800 pt-4 w-full flex justify-center">
                <a href="/configuracion" class="nav-icon group {% if active_page == 'configuracion' %}active{% endif %} w-full">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="absolute left-20 bg-slate-800 text-white px-3 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-xl whitespace-nowrap pointer-events-none">Configuración</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex bg-[#0B1120] overflow-hidden">
        {% block content %}{% endblock %}
    </main>

    <div class="w-[200px] telemetry-panel p-4 flex flex-col space-y-4 relative z-10 shadow-2xl">
        <h3 class="text-[#f8fafc] font-bold text-[9px] uppercase tracking-widest mb-1 border-b border-slate-700 pb-2">Data Visualization</h3>
        
        <div>
            <div class="flex justify-between text-[9px] text-[#10b981] mb-1 font-bold"><span>API Latency</span><span id="tel_latency">0.0s</span></div>
            <div class="chart-container"><canvas id="chartLatency"></canvas></div>
        </div>
        <div>
            <div class="flex justify-between text-[9px] text-purple-400 mb-1 font-bold"><span>Token Spikes</span></div>
            <div class="chart-container"><canvas id="chartTokens"></canvas></div>
            <div class="text-[9px] text-slate-400 mt-1 text-right">Total: <span id="tel_tokens">0</span></div>
        </div>

        <div class="mt-2 space-y-2 text-[10px]">
            <div class="flex items-center text-[#10b981]"><span class="status-indicator" id="ind_system"></span> System: <span id="tel_system" class="ml-1 font-bold">ACTIVE</span></div>
            <div class="flex items-center text-[#10b981]"><span class="status-indicator" id="ind_api"></span> API: <span id="tel_api" class="ml-1 font-bold">STABLE</span></div>
            <div class="flex items-center text-slate-400"><span class="status-indicator bg-purple-500"></span> Uptime: <span id="tel_uptime" class="ml-1">0m 0s</span></div>
        </div>

        <div class="mt-auto border-t border-slate-700 pt-3">
            <button onclick="actualizarTelemetria()" class="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded text-[9px] text-slate-300 font-bold border border-slate-600 transition-colors">+ Refresh</button>
        </div>
    </div>

    <script>
        let latencyChart, tokenChart;

        function initCharts() {
            const chartOptions = { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false, beginAtZero: true } }, plugins: { legend: { display: false }, tooltip: { enabled: false } }, elements: { point: { radius: 0 } } };
            latencyChart = new Chart(document.getElementById('chartLatency').getContext('2d'), {
                type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#10b981', borderWidth: 2, tension: 0.4 }] }, options: chartOptions
            });
            tokenChart = new Chart(document.getElementById('chartTokens').getContext('2d'), {
                type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#a855f7', borderWidth: 2, tension: 0.4, backgroundColor: 'rgba(168, 85, 247, 0.1)', fill: true }] }, options: chartOptions
            });
        }
        
        async function actualizarTelemetria() {
            try {
                const res = await fetch('/api/telemetria');
                const data = await res.json();
                
                document.getElementById('tel_uptime').innerText = data.uptime;
                document.getElementById('tel_latency').innerText = data.latencia;
                document.getElementById('tel_tokens').innerText = data.tokens_totales.toLocaleString();
                
                const apiEl = document.getElementById('tel_api');
                const indApi = document.getElementById('ind_api');
                apiEl.innerText = data.api_status;
                if(data.api_status === 'OFFLINE') {
                    apiEl.classList.replace('text-[#10b981]', 'text-red-500');
                    indApi.classList.replace('bg-[#10b981]', 'bg-red-500');
                } else {
                    apiEl.classList.replace('text-red-500', 'text-[#10b981]');
                    indApi.classList.replace('bg-red-500', 'bg-[#10b981]');
                }

                if(latencyChart && tokenChart && data.historial_latencia) {
                    latencyChart.data.datasets[0].data = data.historial_latencia; latencyChart.update();
                    tokenChart.data.datasets[0].data = data.historial_tokens; tokenChart.update();
                }
            } catch(e) { console.error("Falla al conectar con telemetría."); }
        }
        
        window.addEventListener('load', () => { initCharts(); actualizarTelemetria(); setInterval(actualizarTelemetria, 10000); });
    </script>
</body>
</html>
